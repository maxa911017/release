<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統覆寫：解放協議</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Noto+Serif+TC:wght@300;700;900&display=swap');
        
        body {
            background-color: #050505;
            color: #EEE;
            font-family: 'Courier Prime', 'Noto Serif TC', monospace;
            overflow: hidden;
            margin: 0;
            padding: 0;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="%23ff3333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>') 0 0, auto;
        }

        /* --- UI 元素 --- */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: radial-gradient(circle at center, #1a0000 0%, #000 70%);
        }

        .cyber-btn {
            background: transparent;
            border: 2px solid #ff3333;
            color: #ff3333;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Courier Prime', monospace;
            letter-spacing: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.2);
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="%23ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>') 0 0, pointer;
        }
        .cyber-btn:hover {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 40px rgba(255, 51, 51, 0.8);
            transform: scale(1.05);
        }

        #terminal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3vw;
            color: #ff3333;
            text-align: center;
            z-index: 50;
            white-space: pre-wrap;
            width: 90%;
            opacity: 0;
            text-shadow: 0 0 15px rgba(255,51,51,0.8);
        }

        #alert-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 0, 0, 0.3);
            z-index: 40;
            opacity: 0;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        /* --- 影像牆 (Phase 1-3) --- */
        #gallery-container {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 2px;
            padding: 10px;
            box-sizing: border-box;
            z-index: 10;
            perspective: 600px;
            transform-style: preserve-3d;
        }

        .subject-img {
            width: 6vw;
            height: 6vw;
            object-fit: cover;
            filter: grayscale(100%) contrast(250%) sepia(50%) brightness(0.4) blur(2px); 
            opacity: 0;
            border: 1px solid rgba(255,255,255,0.1);
            transform: translateZ(-500px);
            box-shadow: inset 0 0 10px #000;
        }
        /* --- 結尾過場 (Phase 4-5) 完全重構層級 --- */
        /* 1. 白光覆蓋層 (確保蓋掉一切) */
        #flash-bang {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ffffff;
            z-index: 80;
            opacity: 0;
            pointer-events: none;
        }

        /* 3. 主視覺容器 (滿版) */
        #final-key-visual {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 85;
            opacity: 0;
            background-color: #ffffff;
            pointer-events: none;
        }
        
        #final-key-visual img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 2. 過場文字容器 (使用 Flexbox 強制置中) */
        #transition-text-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 90;
            opacity: 0;
            pointer-events: none;
        }

        #transition-text-container h1 {
            color: #000000;
            font-size: 4vw;
            letter-spacing: 0.5em;
            font-weight: 700;
            margin: 0; /* 確保沒有預設 margin 推擠 */
            font-family: 'Noto Serif TC', serif;
        }

        /* 4. 演職人員名單 (遮罩與滾動) */
        #credits-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 95;
            pointer-events: none;
            display: none;
            overflow: hidden;
            font-family: 'Noto Serif TC', serif;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }
        #credits-content {
            position: absolute;
            width: 100%;
            text-align: center;
            color: #EEE;
        }
        .credits-title {
            font-size: 2rem;
            letter-spacing: 0.5em;
            margin-bottom: 5rem;
            color: #ff3333;
            font-weight: 900;
        }
        .credit-group {
            margin-bottom: 3rem;
        }
        .credit-role {
            font-size: 1rem;
            color: #888;
            letter-spacing: 0.3em;
            margin-bottom: 0.5rem;
        }
        .credit-name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        /* --- 氛圍特效 --- */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.3));
            background-size: 100% 4px;
            z-index: 999;
            pointer-events: none;
            opacity: 0.8;
        }
        
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 998;
            opacity: 0.08;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }
    </style>
</head>
<body>
    <audio id="bgm" src="1.mp3"></audio>

    <div class="scanlines" id="scanlines"></div>
    <div class="noise" id="noise"></div>
    <div id="alert-overlay"></div>

    <!-- 開場 -->
    <div id="start-screen">
        <button id="start-btn" class="cyber-btn">
            Initiate Release Protocol<br>
            <span class="text-sm font-sans tracking-widest mt-2 block opacity-70">啟動最高權限解密</span>
        </button>
    </div>

    <!-- 終端機與圖庫 -->
    <div id="terminal"></div>
    <div id="gallery-container"></div>

    <!-- 重新設計的結尾層級：確保絕對置中與清場 -->
    <!-- 層級 1: 白光底層 (z-index: 80) -->
    <div id="flash-bang"></div>
    
    <!-- 層級 3: 主視覺 (z-index: 85) -->
    <div id="final-key-visual">
        <img src="1.png" alt="Key Visual">
    </div>

    <!-- 層級 2: 過場文字 Flexbox 容器 (z-index: 90) -->
    <div id="transition-text-container">
        <h1>最終，我們得到釋放</h1>
    </div>

    <!-- 層級 4: 滾動名單 (z-index: 95) -->
    <div id="credits-screen">
        <div id="credits-content">
            <h2 class="credits-title">演職人員名單</h2>
            <div class="credit-group"><div class="credit-role">編⠀⠀⠀劇</div><div class="credit-name">林珈儀</div></div>
            <div class="credit-group"><div class="credit-role">導⠀⠀⠀演</div><div class="credit-name">林珈儀</div></div>
            <div class="credit-group"><div class="credit-role">執行製作</div><div class="credit-name">呂穎薰</div></div>
            <div class="credit-group"><div class="credit-role">舞台監督</div><div class="credit-name">陳雅均</div></div>
            <div class="credit-group"><div class="credit-role">行政經理</div><div class="credit-name">林心惟</div></div>
            <div class="credit-group"><div class="credit-role">互動設計</div><div class="credit-name">廖冠皓</div></div>
            <div class="credit-group"><div class="credit-role">展覽策劃</div><div class="credit-name">廖冠皓、李柏翰</div></div>
            <div class="credit-group"><div class="credit-role">行銷宣傳</div><div class="credit-name">林心惟</div></div>
            <div class="credit-group"><div class="credit-role">文宣設計</div><div class="credit-name">Anjan</div></div>
            <div class="credit-group"><div class="credit-role">妝造設計</div><div class="credit-name">葉相吟</div></div>
            <div class="credit-group"><div class="credit-role">燈光設計</div><div class="credit-name">林孝丞</div></div>
            <div class="credit-group"><div class="credit-role">燈光執行</div><div class="credit-name">林書丞</div></div>
            
            <div class="credit-group" style="margin-top: 5rem; margin-bottom: 40vh;">
                <div class="credit-role">演⠀⠀⠀員</div>
                <div class="credit-name" style="line-height: 1.8;">
                    王韋鈞、吳佩錡、呂穎薰<br>徐瑞宏、曾語潔、蕭靜瑩<br>
                    <span style="font-size: 0.9rem; color: #666; font-weight: 300; display: block; margin-top: 10px;">（依姓氏筆劃排序）</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ==========================================
        // 替換為你的 Firebase Config
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD8ERvnrdHJzTAr7xDIdXuiqZ9o7d_wW_U",
            authDomain: "checkpoint-system-ee6d7.firebaseapp.com",
            projectId: "checkpoint-system-ee6d7",
            storageBucket: "checkpoint-system-ee6d7.firebasestorage.app",
            messagingSenderId: "188995102122",
            appId: "1:188995102122:web:6d8ef558b8c9f6262bf7d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let subjects = [];
        const gallery = document.getElementById('gallery-container');
        const startBtn = document.getElementById('start-btn');
        const bgm = document.getElementById('bgm');

        async function fetchRecords() {
            startBtn.innerHTML = "Establishing Connection...<br><span class='text-sm mt-2 block'>正在連線至機密主機...</span>";
            startBtn.disabled = true;
            try {
                const querySnapshot = await getDocs(collection(db, "archived_subjects"));
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.imageData) {
                        subjects.push(data.imageData);
                    }
                });

                while (subjects.length < 120 && subjects.length > 0) {
                    subjects = subjects.concat(subjects).slice(0, 120);
                }

                subjects.forEach((imgBase64) => {
                    const img = document.createElement('img');
                    img.src = imgBase64;
                    img.className = 'subject-img';
                    gallery.appendChild(img);
                });

                startBtn.innerHTML = "OVERRIDE SYSTEM<br><span class='text-sm mt-2 block'>[ 執行強制解放協議 ]</span>";
                startBtn.disabled = false;

            } catch (error) {
                console.error("讀取失敗：", error);
                startBtn.innerHTML = "<span class='text-red-500'>[ DATA CORRUPTED ]</span>";
            }
        }

        fetchRecords();

        startBtn.addEventListener('click', () => {
            bgm.play().catch(e => console.log("音樂播放被阻擋", e));
            
            gsap.to("#start-screen", { 
                opacity: 0, 
                duration: 0.3,
                onComplete: () => {
                    document.getElementById('start-screen').style.display = 'none';
                    startAnimationSequence();
                }
            });
        });

        function startAnimationSequence() {
            const tl = gsap.timeline();
            const images = gsap.utils.toArray('.subject-img');
            const terminal = document.getElementById('terminal');

            // Phase 1: 駭入與血色警告
            tl.set(terminal, { opacity: 1 })
              .to("#alert-overlay", { opacity: 0.8, duration: 0.2, yoyo: true, repeat: 7, ease: "steps(1)" }, 0)
              .to(terminal, { duration: 1, text: "ACCESSING DEEP ARCHIVE...", ease: "none" }, 0)
              .to(terminal, { duration: 0.8, text: "CRITICAL WARNING:\nCONTAINMENT BREACH", ease: "none", color: "#ff0000", scale: 1.2 }, "+=0.2")
              .to(terminal, { duration: 0.1, opacity: 0, yoyo: true, repeat: 3 })
              .to(terminal, { duration: 0.5, opacity: 1, scale: 2.5, color: "#fff", text: "ALL CELLS: UNLOCKED", ease: "power4.out" })
              .to(terminal, { duration: 0.5, opacity: 0, scale: 5, ease: "power2.in" });

            // Phase 2: 檔案庫現身與收縮
            tl.to(images, {
                opacity: 0.8,
                filter: "grayscale(100%) contrast(300%) sepia(80%) brightness(0.2) blur(0px)",
                z: () => gsap.utils.random(-800, -300),
                duration: 2,
                stagger: { amount: 2, from: "random" }, 
                ease: "power2.out"
            }, "-=0.5");

            tl.to("#gallery-container", {
                scale: 0.8,
                rotationZ: () => gsap.utils.random(-5, 5),
                duration: 3,
                ease: "power1.in"
            }, "-=2");

            tl.to("body", {
                x: () => gsap.utils.random(-15, 15),
                y: () => gsap.utils.random(-15, 15),
                rotation: () => gsap.utils.random(-1, 1),
                duration: 0.05,
                repeat: 60,
                yoyo: true,
                ease: "rough({ template: none.out, strength: 3, points: 50, taper: 'in', randomize: true, clamp: false })"
            }, "-=3");

            // Phase 3: 核爆級釋放 (修正：移除會導致殘留的翻轉)
            tl.to(["#scanlines", "#noise", "#alert-overlay"], { opacity: 0, duration: 0.5 }, "-=0.2");

            tl.to("#gallery-container", {
                scale: 2.5,
                rotationZ: 0,
                duration: 10,
                ease: "power2.out"
            }, "-=0.2");

            tl.to(images, {
                filter: "grayscale(0%) contrast(120%) sepia(0%) brightness(1.5)",
                scale: () => gsap.utils.random(8, 25),
                x: () => gsap.utils.random(-1500, 1500), 
                y: () => gsap.utils.random(-1000, 1000),
                z: () => gsap.utils.random(800, 3000), 
                opacity: 0,
                duration: 6,
                stagger: {
                    amount: 10,
                    from: "center",
                    grid: "auto"
                },
                ease: "expo.in"
            }, "-=10");

            tl.to("body", {
                x: () => gsap.utils.random(-50, 50),
                y: () => gsap.utils.random(-50, 50),
                duration: 0.03,
                repeat: 20,
                yoyo: true,
                ease: "rough({ strength: 10 })"
            }, "-=8");

            // Phase 4: 白底與乾淨的過場文字 (徹底重構)
            // 1. 白光亮起，覆蓋全部
            tl.to("#flash-bang", { opacity: 1, duration: 2, ease: "power2.inOut" }, "-=4") 
              // 2. 「關鍵」：徹底隱藏底層元素，保證清場
              .set("#gallery-container", { display: "none" })
              .set("#terminal", { display: "none" })
            
            // 3. 過場文字淡入、停留、淡出 (控制 Flexbox 容器的 opacity)
              .to("#transition-text-container", { opacity: 1, duration: 2, ease: "power2.out" })
              .to("#transition-text-container", { opacity: 1, duration: 2 }) // 停留
              .to("#transition-text-container", { opacity: 0, duration: 1.5, ease: "power2.in" })
              
            // 4. 主視覺圖片淡入
              .to("#final-key-visual", { opacity: 1, duration: 3, ease: "power2.inOut" }, "-=0.5"); 

            // Phase 5: 謝幕與演職人員名單
            // 背景變暗，準備謝幕
            tl.to("#final-key-visual", { backgroundColor: "#000000", duration: 3, ease: "power2.inOut" }, "+=4")
              .to("#flash-bang", { backgroundColor: "#000000", duration: 3, ease: "power2.inOut" }, "<")
              .to("#final-key-visual img", { 
                  opacity: 0.12, 
                  scale: 1.15, 
                  filter: "blur(3px)", 
                  duration: 35, 
                  ease: "none" 
              }, "<") 
              // 名單升起
              .set("#credits-screen", { display: "block" }, "-=2")
              .fromTo("#credits-content",
                  { y: "100vh" },
                  { y: "-100%", duration: 35, ease: "none" },
                  "<"
              );
        }

        gsap.registerEffect({
            name: "text",
            effect: (targets, config) => {
                let text = config.text;
                let obj = { length: 0 };
                return gsap.to(obj, {
                    length: text.length,
                    duration: config.duration,
                    ease: "none",
                    onUpdate: function() {
                        targets[0].innerText = text.substring(0, Math.floor(obj.length));
                    }
                });
            },
            extendTimeline: true,
        });
    </script>
</body>
</html>
